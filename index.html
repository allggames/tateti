<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>⭕TATETI DE LA SUERTE❌</title>

  <!-- Lexend font -->
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- decorativo: iconos sutiles de fondo (para la pantalla principal) -->
  <div class="bg-icons" aria-hidden="true">
    <span>⭕</span><span>❌</span><span>🎁</span><span>✨</span>
    <span>⭕</span><span>❌</span><span>🎁</span><span>✨</span>
    <span>⭕</span><span>❌</span>
  </div>

  <main class="container" id="app">
    <h1 class="title">⭕TATETI DE LA SUERTE❌</h1>
    <p class="subtitle">Veamos que bono conseguis hoy🏃🏽‍♂️💨</p>

    <section class="controls">
      <div class="control-row small">
        <button id="pickX" class="choice active">❌</button>
        <button id="pickO" class="choice">⭕</button>
        <button id="restartBtn" class="secondary">Reiniciar</button>
      </div>
    </section>

    <section class="scoreboard">
      <div class="score-item">
        <strong>Tus victorias</strong>
        <span id="playerWins">0 / 3</span>
        <small id="playerBonusPercent">Bono: 0%</small>
      </div>
      <div class="score-item">
        <strong>Victorias NEXUS</strong>
        <span id="cpuWins">0 / 3</span>
        <small id="cpuBonusPercent">Bono: 0%</small>
      </div>
      <div class="score-item">
        <strong>Partidas restantes</strong>
        <span id="playsLeft">3</span>
      </div>
    </section>

    <section class="board-area">
      <div id="message" class="message">Comenzá la serie tocando "Comenzar"</div>
      <div id="board" class="board" aria-label="Tablero de tatetí" role="grid">
        <button class="cell" data-index="0" aria-label="Casilla 0"></button>
        <button class="cell" data-index="1" aria-label="Casilla 1"></button>
        <button class="cell" data-index="2" aria-label="Casilla 2"></button>
        <button class="cell" data-index="3" aria-label="Casilla 3"></button>
        <button class="cell" data-index="4" aria-label="Casilla 4"></button>
        <button class="cell" data-index="5" aria-label="Casilla 5"></button>
        <button class="cell" data-index="6" aria-label="Casilla 6"></button>
        <button class="cell" data-index="7" aria-label="Casilla 7"></button>
        <button class="cell" data-index="8" aria-label="Casilla 8"></button>
      </div>
    </section>

    <footer class="legend" aria-hidden="true"></footer>
  </main>

  <!-- INTRO: presentación con logo2 (aparece primero). Se auto-oculta y luego salta al cartel NEXUS -->
  <div id="introOverlay" class="intro-overlay" role="dialog" aria-modal="true" aria-label="Presentación">
    <div class="intro-card">
      <img id="introLogo" src="images/logo2.png" alt="Logo presentación" />
    </div>
    <!-- contenedor para partículas decorativas en el intro (opcional) -->
    <div id="introParticles" class="intro-particles" aria-hidden="true"></div>
  </div>

  <!-- Cartel central (overlay) con NEXUS + botón Comenzar (se muestra tras Intro) -->
  <div id="opponentBanner" class="overlay hidden" role="dialog" aria-modal="true" aria-label="Cartel iniciar serie">
    <div class="overlay-card" role="region" aria-label="Oponente y comenzar">
      <div class="opponent-text">HOY JUGARÁS CONTRA NEXUS🤖</div>
      <button id="startBtn" class="primary banner-start">Comenzar</button>
    </div>
  </div>

  <!-- Logo fijo inferior (aparece cuando el tablero está visible) -->
  <img id="footerLogo" class="footer-logo hidden" src="images/logo.png" alt="Logo pie de página" aria-hidden="true">

  <!-- Modal que muestra el bono final al completar las 3 partidas -->
  <div id="resultModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-content">
      <h2 id="modalTitle">Resultado final</h2>
      <p class="modal-label">EL BONO OBTENIDO ES:</p>
      <div id="modalPercent" class="modal-percent">0%</div>
      <p id="modalMessage" class="modal-subtext"></p>
      <p class="modal-instruction">Envíanos captura para reclamarlo</p>
      <div class="modal-actions">
        <button id="modalClose" class="primary">Cerrar</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
