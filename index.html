<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Tatetí - Jugador vs CPU</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <h1>Tatetí — Jugador vs CPU</h1>

    <section class="controls">
      <div class="control-row">
        <label>Elegir pieza:</label>
        <button id="pickX" class="choice active">X</button>
        <button id="pickO" class="choice">O</button>
      </div>

      <div class="control-row">
        <label>Quién empieza:</label>
        <select id="whoStarts">
          <option value="player">Tú</option>
          <option value="cpu">CPU</option>
        </select>
      </div>

      <div class="control-row">
        <label>Dificultad:</label>
        <select id="difficulty">
          <option value="easy">Fácil</option>
          <option value="medium" selected>Medio</option>
          <option value="hard">Difícil</option>
        </select>
      </div>

      <div class="control-row">
        <button id="startBtn" class="primary">Comenzar</button>
        <button id="restartBtn">Reiniciar</button>
      </div>
    </section>

    <section class="board-area">
      <div id="message" class="message">Presioná "Comenzar" para jugar</div>
      <div id="board" class="board" aria-label="Tablero de tatetí" role="grid">
        <button class="cell" data-index="0" aria-label="Casilla 0"></button>
        <button class="cell" data-index="1" aria-label="Casilla 1"></button>
        <button class="cell" data-index="2" aria-label="Casilla 2"></button>
        <button class="cell" data-index="3" aria-label="Casilla 3"></button>
        <button class="cell" data-index="4" aria-label="Casilla 4"></button>
        <button class="cell" data-index="5" aria-label="Casilla 5"></button>
        <button class="cell" data-index="6" aria-label="Casilla 6"></button>
        <button class="cell" data-index="7" aria-label="Casilla 7"></button>
        <button class="cell" data-index="8" aria-label="Casilla 8"></button>
      </div>
    </section>

    <footer class="legend">
      <p>Hecho con ❤️ — Minimax en dificultad Difícil. Texto en español.</p>
    </footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
